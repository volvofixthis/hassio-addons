name: "Alertmanager"
version: "0.0.5"
slug: "alertmanager"
description: "Prom Alertmanager add-on"
arch:
  - amd64
  - aarch64
  - armv7
init: false

host_network: false
ports:
  9093/tcp: 9093

map:
  - addon_config:rw

options:
  listen_address: "0.0.0.0:9093"
  config_file: "/config/alertmanager.yml"
  extra_args: "--log.level=debug"

schema:
  listen_address: str
  config_file: str
  extra_args: str

